{% set name = "dace" %}
{% set version = "1.0.2" %}

package:
 name: {{ name|lower }}
 version: {{ version }}
   
source:
 url: https://pypi.io/packages/source/d/dace/dace-{{ version }}.tar.gz
 sha256: 6728f4bcf584b9f5bbb9c9a393fbdd87364af0c6ad9120da0302b8b470f4f71c

build:
 entry_points:
   - dacelab = dace.cli.dacelab:main
   - sdfv = dace.cli.sdfv:main
   - sdfgcc = dace.cli.sdfgcc:main
   - fcfd = dace.cli.fcdc:main
   - daceprof = dace.cli.daceprof:main
 script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
 number: 0

requirements:
 host:
   - pip
   - python >=3.7
   - python<3.13
 run:
   - numpy <2.0
   - networkx >=2.5
   - astunparse
   - sympy >=1.9
   - pyyaml
   - ply
   - pip
   - setuptools-scm
   - fparser >=0.1.3
   - aenum >=3.1
   - dill
   - packaging
   - pyreadline  # [windows]
   - dataclasses
   - typing-compat 
 
test:
 imports:
   - dace
 commands:
   - pip check
   - dacelab --help
  #- sdfv --help <- needs fix
   - sdfgcc --help
   - fcfd --help
   - daceprof --help
 requires:
   - pip

about:
 home: https://github.com/spcl/dace
 summary: Data-Centric Parallel Programming Framework
 license: BSD-3-Clause
 license_file:
   - LICENSE
   - dace/viewer/webclient/LICENSE
   - dace/external/cub/LICENSE.TXT
   - dace/external/moodycamel/LICENSE.md
   - dace/external/moodycamel/tests/relacy/relacy/LICENSE
   - dace/external/hlslib/LICENSE.md

extra:
 recipe-maintainers:
   - tbennun
   - lukastruemper
